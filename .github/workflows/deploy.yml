name: Auto Deploy to Server
on:
  push:
    branches:
      - main # Menjalankan workflow otomatis setiap kali ada push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Menggunakan runner Ubuntu terbaru dari GitHub
    steps:
      - name: Checkout Code
        [cite_start]uses: actions/checkout@v3 # Mengambil kode terbaru dari repository GitHub kamu

      # --- BAGIAN 1: BUILD & PUSH KE DOCKER HUB ---
      - name: Login Docker Hub
        [cite_start]uses: docker/login-action@v2 # Action standar untuk login ke Docker Hub
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Docker Image
        [cite_start]uses: docker/build-push-action@v4 # Membangun image dan mengirimnya ke Docker Hub
        with:
          push: true
          # Menggunakan tag 'latest' untuk image di Docker Hub
          tags: ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest 

      # --- BAGIAN 2: PERSIAPAN AKSES TUNNEL ---
      - name: Install Cloudflared
        run: |
          # Mengunduh dan memasang cloudflared di runner GitHub agar bisa menembus tunnel [cite: 36, 51]
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH Config Bridge
        run: |
          # Membuat folder .ssh jika belum ada
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.SSH_HOST }}" > ~/.ssh/config
          echo "ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # --- BAGIAN 3: DEPLOY KE SERVER VIA SSH ---
      - name: Deploy to Server via SSH Tunnel
        [cite_start]uses: appleboy/ssh-action@v1.0.3 # Masuk ke server untuk menjalankan perintah remote
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          [cite_start]key: ${{ secrets.SSH_KEY }} # Menggunakan Private Key SSH kamu
          script: |
            # 1. Menarik image terbaru yang baru saja di-push ke Docker Hub [cite: 6, 91]
            docker pull ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
            # 2. Menghentikan container lama jika sedang berjalan [cite: 91]
            docker stop app || true
            # 3. Menghapus container lama agar tidak bentrok [cite: 91]
            docker rm app || true
            docker run -d \
              --name app \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
