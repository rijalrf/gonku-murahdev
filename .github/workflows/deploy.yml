name: Deploy via Cloudflare Tunnel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 2. Build image dan push ke Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest

      # 3. Setup otomatis Cloudflare Tunnel & SSH Bridge
      - name: Setup Cloudflare Tunnel
        uses: NX1X/cloudflare-tunnel-ssh-action@v1
        with:
          cf-access-client-id:     ${{ secrets.CF_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_CLIENT_SECRET }}
          ssh-private-key:         ${{ secrets.SSH_KEY }}
          ssh-host:                ${{ secrets.SSH_HOST }}
          ssh-user:                ${{ secrets.SSH_USER }}

      # 4. Eksekusi perintah di server menggunakan SSH bawaan sistem gonku
      - name: Deploy to Server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            docker pull ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
            docker stop app || true
            docker rm app || true
            # Jalankan container baru dengan image versi terbaru
            docker run -d --name app -p 3000:3000 --restart always ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
