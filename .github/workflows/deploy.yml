name: Auto Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 3. Build dan Push Image ke Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Pastikan rahasia DOCKER_USER sesuai dengan username Docker Hub kamu
          tags: ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest

      # 4. Install Cloudflare & Setup SSH Config (SOLUSI UTAMA)
      - name: Install Cloudflare and Setup SSH Bridge
        run: |
          # Install cloudflared di runner GitHub Actions [cite: 98]
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # Buat direktori .ssh dan file config di runner [cite: 96, 99]
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.SSH_HOST }}" > ~/.ssh/config
          echo "  ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # 5. Deploy ke Server (Sekarang akan otomatis menggunakan proxy dari config)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Tidak perlu proxy_command di sini karena sudah dipaksa lewat ~/.ssh/config 
          script: |
            # Tarik image terbaru dari Docker Hub
            docker pull ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
            
            # Hentikan dan hapus container lama jika ada
            docker stop app || true
            docker rm app || true
            
            # Jalankan container baru [cite: 92]
            docker run -d \
              --name app \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
