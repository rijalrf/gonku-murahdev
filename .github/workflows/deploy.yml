name: Auto Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 3. Build dan Push Image ke Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest

      # 4. Install Cloudflare & Setup SSH Config
      - name: Install Cloudflare and Setup SSH
        run: |
          # Install cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # Buat direktori .ssh dan file config di runner
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.SSH_HOST }}" > ~/.ssh/config
          echo "ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # 5. Deploy ke Server (Sekarang akan otomatis menggunakan proxy dari config)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Kita tidak lagi memakai proxy_command di sini karena sudah ada di ~/.ssh/config
          script: |
            docker pull ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
            docker stop app || true
            docker rm app || true
            docker run -d \
              --name app \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
