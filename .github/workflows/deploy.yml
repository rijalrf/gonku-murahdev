name: Auto Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login ke Docker Hub menggunakan Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 3. Build dan Push Image ke Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Pastikan 'playdeveloper' adalah username Docker Hub kamu
          tags: playdeveloper/gonku.murahdev:latest

      # 4. Install Cloudflare Tunnel Client di Runner GitHub Actions
      - name: Install Cloudflare
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          # Verifikasi instalasi
          which cloudflared

      # 5. Deploy ke Server melalui Cloudflare Tunnel
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Menggunakan proxy_command agar bisa menembus tunnel
          proxy_command: /usr/local/bin/cloudflared access ssh --hostname %h
          script: |
            # Tarik image terbaru
            docker pull playdeveloper/gonku.murahdev:latest
            
            # Hentikan dan hapus container lama jika ada
            docker stop app || true
            docker rm app || true
            
            # Jalankan container baru
            docker run -d \
              --name app \
              -p 3000:3000 \
              --restart always \
              playdeveloper/gonku.murahdev:latest