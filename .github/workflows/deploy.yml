name: Auto Deploy to Server
on:
  push:
    branches:
      - main # Workflow hanya berjalan saat kamu melakukan push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Menggunakan runner Ubuntu terbaru dari GitHub
    steps:
      # 1. Mengambil kode terbaru dari repository GitHub kamu
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Login ke Docker Hub agar bisa mengirim (push) image hasil build
      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 3. Membangun Docker image dari Dockerfile dan mengirimnya ke Docker Hub [cite: 48, 57]
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest

      # 4. Menginstal cloudflared di runner GitHub agar bisa mengenali jalur tunnel [cite: 34, 79]
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 5. Konfigurasi SSH Bridge: Memaksa koneksi SSH ke domain kamu agar melewati tunnel [cite: 35, 142]
      # Menggunakan Service Token agar tidak terhalang verifikasi email Cloudflare 
      - name: Setup SSH Config Bridge
        run: |
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.SSH_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_CLIENT_ID }} --service-token-secret ${{ secrets.CF_CLIENT_SECRET }}
            StrictHostKeyChecking no" > ~/.ssh/config

      # 6. Masuk ke server via SSH Tunnel dan menjalankan perintah deploy [cite: 49, 58]
      - name: Deploy to Server via SSH Tunnel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Menarik image terbaru yang tadi sudah di-push ke Docker Hub
            docker pull ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
            # Menghentikan dan menghapus container lama agar tidak bentrok [cite: 73, 74]
            docker stop app || true
            docker rm app || true
            # Jalankan container baru dengan image versi terbaru
            docker run -d --name app -p 3000:3000 --restart always ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest