name: Auto Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      # 3. Build Image
      - name: Build Docker Image
        run: docker build -t gonku/murahdev:latest .

      # 4. Push Image
      - name: Push Docker Image
        run: docker push gonku/murahdev:latest

      # 5. Deploy ke Server (AUTO PULL + RUN)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull gonku/murahdev:latest

            docker stop app || true
            docker rm app || true

            docker run -d \
              --name app \
              -p 3000:3000 \
              --restart always \
              gonku/murahdev:latest