name: Auto Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # 2. Build & Push Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest

      # 3. Install Cloudflare Tunnel Client di Runner
      - name: Install Cloudflare
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      # 4. Deploy ke Server (via Cloudflare Tunnel)
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Perintah ini yang membuat GitHub Actions bisa masuk lewat tunnel
          proxy_command: /usr/local/bin/cloudflared access ssh --hostname %h
          script: |
            docker pull ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest
            docker stop app || true
            docker rm app || true
            docker run -d \
              --name app \
              -p 3000:3000 \
              --restart always \
              ${{ secrets.DOCKER_USER }}/gonku.murahdev:latest